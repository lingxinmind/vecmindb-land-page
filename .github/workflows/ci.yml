name: Landing Page CI

on:
  push:
    branches: [ main, master ]

jobs:
  static_check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: HTML Syntax Check
      run: |
        for f in index.html pricing.html; do
          echo "Checking $f..."
          grep -q '</html>' "$f" && echo "  OK" || { echo "  FAIL: $f missing closing </html>"; exit 1; }
        done
    - name: Deploy Trigger
      run: echo "Deployment will be handled by GitHub Pages."
